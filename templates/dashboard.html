<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WAF 대시보드</title>
  <meta name="color-scheme" content="dark" />
  <link rel="stylesheet" href="/__waf/static/css/dashboard.css" />
</head>
<body>
  <noscript>
    <p style="margin:0;padding:1rem;background:#1e293b;color:#f8fafc;font-family:system-ui;">JavaScript가 필요합니다.</p>
  </noscript>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-icon" aria-hidden="true">🛡</div>
        <div>
          <div class="brand-text">WAF</div>
          <div class="brand-sub">Proxy</div>
        </div>
      </div>
      <button type="button" class="btn-gradient" id="btn-refresh">↻ 갱신</button>
      <div>
        <div class="nav-label">이동</div>
        <a class="nav-item active" href="/__waf/dashboard" aria-current="page">대시보드</a>
        <a class="nav-item" href="/" target="_blank" rel="noopener">프록시 /</a>
      </div>
    </aside>
    <div class="main">
      <header class="topbar">
        <span class="page-title">대시보드</span>
        <span class="clock" id="clock"></span>
      </header>
      <div class="content">
        <div class="grid">
          <div class="card">
            <h2>업스트림</h2>
            <p><a href="{{ upstream }}" target="_blank" rel="noopener">{{ upstream }}</a></p>
          </div>
          <div class="card">
            <h2>연결</h2>
            <p id="upstream-status">…</p>
          </div>
          <div class="card">
            <h2>WAF</h2>
            <p id="waf-enabled">…</p>
          </div>
          <div class="card">
            <h2>차단 심각도</h2>
            <p id="waf-severity">…</p>
          </div>
          <div class="card card-wide">
            <h2>접속자 (고유 IP)</h2>
            <p class="clients-big" aria-live="polite">
              <span id="clients-count">0</span><span class="clients-label">명</span>
              <span class="clients-sub" id="clients-requests-total"></span>
            </p>
            <div class="traffic-feed">
              <table class="traffic-table">
                <thead>
                  <tr>
                    <th>IP</th>
                    <th>요청</th>
                    <th>첫 접속 (KST)</th>
                    <th>마지막 (KST)</th>
                    <th>User-Agent</th>
                  </tr>
                </thead>
                <tbody id="clients-feed-body">
                  <tr><td colspan="5" class="traffic-empty">…</td></tr>
                </tbody>
              </table>
            </div>
            <p id="clients-updated" class="feed-foot"></p>
          </div>
          <div class="card card-wide">
            <h2>프록시 로그</h2>
            <div class="traffic-feed">
              <table class="traffic-table">
                <thead>
                  <tr>
                    <th>시각 (KST)</th>
                    <th>IP</th>
                    <th>Method</th>
                    <th>Path</th>
                    <th>결과</th>
                    <th>User-Agent</th>
                  </tr>
                </thead>
                <tbody id="traffic-feed-body">
                  <tr><td colspan="6" class="traffic-empty">…</td></tr>
                </tbody>
              </table>
            </div>
            <p id="traffic-updated" class="feed-foot"></p>
          </div>
        </div>
        <p id="updated" class="feed-foot"></p>
      </div>
    </div>
  </div>
  <script type="application/json" id="waf-boot-data">{{ boot | tojson }}</script>
  <script src="/__waf/static/js/dashboard.js" defer></script>
</body>
</html>
