# OWASP Juice Shop — 웹 취약점 데모 앱 (WAF 업스트림으로 사용)
# 시작: docker compose up -d
#
# "3001:3000" = 호스트(맥/윈) 3001 → 컨테이너 내부 3000. 오른쪽 3000은 이미지 고정값, 바꾸지 말 것.
# .env 의 JUICE_SHOP_HOST_PORT 는 이 파일을 건드리지 않음(예전에 .env=3000 이면 호스트 3000 충돌 났음).
# 다른 호스트 포트가 필요하면 아래 한 줄만 예: "3002:3000" 로 수정하고 UPSTREAM_URL 도 맞출 것.

name: ai-security-system

services:
  juice-shop:
    image: bkimminich/juice-shop:latest
    ports:
      - "3001:3000"
    restart: unless-stopped
